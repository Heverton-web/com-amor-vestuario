<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ecossistema Com Amor · Apresentação Comercial</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #11100F;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  #stage {
    position: fixed;
    top: 50%; left: 50%;
    transform-origin: top left;
    will-change: transform;
    background: #F7F5F0;
    box-shadow: 0 20px 80px rgba(0,0,0,0.6);
  }
  iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    background: #F7F5F0;
  }
  .counter {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(28, 27, 26, 0.85);
    color: #F7F5F0;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 14px;
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
    z-index: 100;
    user-select: none;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(247, 245, 240, 0.1);
  }
  .counter .label { 
    color: rgba(247, 245, 240, 0.6); 
    margin-left: 8px; 
    font-weight: 500;
  }
  .nav-zone {
    position: fixed;
    top: 0; bottom: 0;
    width: 10%;
    cursor: pointer;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  .nav-zone.left  { left: 0; }
  .nav-zone.right { right: 0; }
  .nav-hint {
    width: 48px; height: 48px;
    border-radius: 999px;
    background: rgba(247, 245, 240, 0.05);
    color: rgba(247, 245, 240, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    opacity: 0;
    transition: all 0.25s ease;
    border: 1px solid rgba(247, 245, 240, 0.05);
  }
  .nav-zone:hover .nav-hint { 
    opacity: 1; 
    background: rgba(247, 245, 240, 0.1);
    color: rgba(247, 245, 240, 0.8);
    transform: scale(1.05);
  }
  .nav-zone.left:hover .nav-hint { transform: translateX(4px) scale(1.05); }
  .nav-zone.right:hover .nav-hint { transform: translateX(-4px) scale(1.05); }

  /* Instruções de teclado */
  .instructions-tip {
    position: fixed;
    bottom: 24px;
    left: 24px;
    font-size: 12px;
    color: rgba(247, 245, 240, 0.4);
    z-index: 100;
    pointer-events: none;
    letter-spacing: 0.05em;
  }

  /* Print Styles */
  @media print {
    @page { size: 1920px 1080px; margin: 0; }
    html, body { background: #fff; overflow: visible; height: auto; }
    #stage { position: static; transform: none !important; box-shadow: none; }
    .counter, .nav-zone, .instructions-tip { display: none !important; }
    .print-stack { display: block; }
    .print-stack iframe {
      width: 1920px;
      height: 1080px;
      page-break-after: always;
      display: block;
    }
  }
</style>
<script>
  window.DECK_MANIFEST = [
    { file: "slides/01-capa.html",        label: "Apresentação" },
    { file: "slides/02-problema.html",    label: "O Desafio do Varejo" },
    { file: "slides/03-arquitetura.html", label: "A Solução Unificada" },
    { file: "slides/04-vendas.html",      label: "Módulo Vendas & Checkout" },
    { file: "slides/05-fidelidade.html",  label: "Módulo Clube & Recompensas" },
    { file: "slides/06-crm.html",         label: "CRM & Inteligência de Marketing" },
    { file: "slides/07-financeiro.html",  label: "Módulo Financeiro & Fiscal" },
    { file: "slides/08-automacao.html",   label: "Automação & APIs (n8n)" },
    { file: "slides/09-valores.html",     label: "Valores de Mercado" },
    { file: "slides/09b-comparativo.html", label: "Análise de Alternativas" },
    { file: "slides/10-fechamento.html",  label: "Conclusão" }
  ];

  window.DECK_WIDTH = 1920;
  window.DECK_HEIGHT = 1080;
</script>
</head>
<body>

<div id="stage">
  <iframe id="frame" src="about:blank"></iframe>
</div>

<div class="nav-zone left"  id="navL"><div class="nav-hint">‹</div></div>
<div class="nav-zone right" id="navR"><div class="nav-hint">›</div></div>
<div class="counter" id="counter">1 / 1</div>
<div class="instructions-tip">Use as setas ← → ou Espaço para navegar. P para imprimir.</div>

<div class="print-stack" id="printStack" style="display:none;"></div>

<script>
(function () {
  const W = window.DECK_WIDTH || 1920;
  const H = window.DECK_HEIGHT || 1080;
  const deck = window.DECK_MANIFEST || [];
  const stage = document.getElementById('stage');
  const frame = document.getElementById('frame');
  const counter = document.getElementById('counter');
  const printStack = document.getElementById('printStack');
  const storageKey = 'deck-comamor-apresentacao';
  let current = 0;

  stage.style.width  = W + 'px';
  stage.style.height = H + 'px';

  function fit() {
    const s = Math.min(window.innerWidth / W, window.innerHeight / H);
    const x = (window.innerWidth  - W * s) / 2;
    const y = (window.innerHeight - H * s) / 2;
    stage.style.transform = `translate(${x}px, ${y}px) scale(${s})`;
    stage.style.top = '0';
    stage.style.left = '0';
  }

  function show(idx) {
    if (idx < 0 || idx >= deck.length) return;
    current = idx;
    frame.src = deck[idx].file;
    counter.innerHTML = `${idx + 1} / ${deck.length} <span class="label">${deck[idx].label || ''}</span>`;
    try { localStorage.setItem(storageKey, String(idx)); } catch (_) {}
    if (location.hash !== '#' + (idx + 1)) {
      history.replaceState(null, '', '#' + (idx + 1));
    }
  }

  function next() { show(Math.min(current + 1, deck.length - 1)); }
  function prev() { show(Math.max(current - 1, 0)); }

  // Teclado
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch (e.key) {
      case 'ArrowRight': case ' ': case 'PageDown': e.preventDefault(); next(); break;
      case 'ArrowLeft':  case 'PageUp':              e.preventDefault(); prev(); break;
      case 'Home':                                    e.preventDefault(); show(0); break;
      case 'End':                                     e.preventDefault(); show(deck.length - 1); break;
      case 'p': case 'P':                             window.print(); break;
      default:
        if (e.key >= '1' && e.key <= '9') {
          const i = parseInt(e.key, 10) - 1;
          if (i < deck.length) { e.preventDefault(); show(i); }
        }
    }
  });

  document.getElementById('navL').addEventListener('click', prev);
  document.getElementById('navR').addEventListener('click', next);
  window.addEventListener('resize', fit);
  window.addEventListener('hashchange', () => {
    const m = location.hash.match(/^#(\d+)$/);
    if (m) show(parseInt(m[1], 10) - 1);
  });

  // Inicialização: hash > localStorage > 0
  const hashMatch = location.hash.match(/^#(\d+)$/);
  if (hashMatch) current = Math.min(parseInt(hashMatch[1], 10) - 1, deck.length - 1);
  else try {
    const v = parseInt(localStorage.getItem(storageKey), 10);
    if (!isNaN(v) && v >= 0 && v < deck.length) current = v;
  } catch (_) {}
  fit();
  show(current);

  // Impressão PDF
  window.addEventListener('beforeprint', () => {
    printStack.innerHTML = '';
    deck.forEach(item => {
      const f = document.createElement('iframe');
      f.src = item.file;
      printStack.appendChild(f);
    });
    printStack.style.display = 'block';
    document.getElementById('stage').style.display = 'none';
  });
  window.addEventListener('afterprint', () => {
    printStack.innerHTML = '';
    printStack.style.display = 'none';
    document.getElementById('stage').style.display = '';
  });
})();
</script>

</body>
</html>
